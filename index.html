<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <h1>🔐 Password Strength Checker</h1>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Enter your password..." maxlength="50">
            <button id="togglePassword" class="toggle-btn">👁️</button>
        </div>

        <div class="strength-meter">
            <div class="strength-bar">
                <div id="strengthFill" class="fill"></div>
            </div>
            <span id="strengthText">Enter a password</span>
        </div>

        <div class="analysis-grid">
            <div class="analysis-card">
                <h3>Character Analysis</h3>
                <div id="charAnalysis"></div>
            </div>
            <div class="analysis-card">
                <h3>Crack Time Estimate</h3>
                <div id="crackTime"></div>
            </div>
        </div>

        <div class="tips" id="tips"></div>
    </div>

    <script src="index.js"></script>
</body>

</html>
